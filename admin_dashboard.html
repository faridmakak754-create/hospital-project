<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-gray-100">
    <header class="bg-slate-600 ">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
               <h1 class="font-semibold text-white">Admin Dashboard</h1>
               <div class="flex items-center gap-4">
                <input type="text" placeholder="Search "
                class="bg-white px-3 py-1 rounded-md "
                >
                <p class="font-semibold text-sm text-gray-200">Dr Sanatomba</p>
               </div>
        </div>
    </header>

    <!-- sidebar -->
     <section class="h-screen bg-slate-800 w-60 fixed top-20 px-5">
        <ul class="pt-10 space-y-4 text-gray-100 font-semibold text-xl">
            <li class="hover:bg-slate-500 p-1"> 
                <a href="">
                      <i class="fa-solid fa-chart-line mr-2"></i>
                    Dashboard
                </a>
            </li>
            <li  class="hover:bg-slate-500 p-1"> 
                <a href="">
                      <i class="fa-solid fa-user-doctor mr-2"></i>
                    Doctor
                </a>
            </li>
            <li  class="hover:bg-slate-500 p-1"> 
                <a href="">
                         <i class="fa-solid fa-calendar-check mr-2"></i>
                    Appointment
                </a>
            </li>
            <li  class="hover:bg-slate-500 p-1"> 
                <a href="">
                   <i class="fa-solid fa-user-injured mr-2"></i>
                    Patients
                </a>
            </li>
        </ul>

       
            <form action="" class="mt-20">
                <button class="bg-sky-500 px-5 py-1 rounded-md text-white font-semibold cursor-pointer">Logout</button>
            </form>

     </section>

     <main class="ml-70 pt-6 pr-10">
        <!-- card -->
        <section class="grid grid-cols-4 gap-4">
            <!-- car1 -->
             <div class=" bg-white p-4 flex justify-around rounded-md shadow-md border border-gray-50 hover:-translate-y-1 hover:shadow-lg transition-all ">
                <!-- left -->
                 <div class="bg-slate-600 h-10 w-10 rounded-full flex items-center justify-center">
                      <i class="fa-solid fa-calendar-check text-xl text-sky-300"></i>
                 </div>
                 <!-- right -->
                  <div>
                    <h2 class="font-semibold text-xl">4+</h2>
                    <p  class=" text-gray-600 font-medium">Appointment</p>
                  </div>
             </div>
               <!-- card-2 -->
             <div class=" bg-white p-4 flex justify-around rounded-md shadow-md border border-gray-50 hover:-translate-y-1 hover:shadow-lg transition-all ">
                <!-- left -->
                 <div class="bg-slate-600 h-10 w-10 rounded-full flex items-center justify-center">
                      <i class="fa-solid fa-user-doctor text-xl text-sky-300"></i>
                 </div>
                 <!-- right -->
                  <div>
                    <h2 class="font-semibold text-xl">4+</h2>
                    <p  class=" text-gray-600 font-medium">No. of Doctors</p>
                  </div>
             </div>

               <!-- car1 -->
             <div class=" bg-white p-4 flex justify-around rounded-md shadow-md border border-gray-50 hover:-translate-y-1 hover:shadow-lg transition-all">
                <!-- left -->
                 <div class="bg-slate-600 h-10 w-10 rounded-full flex items-center justify-center">
                      <i class="fa-solid fa-user-injured text-xl text-sky-300"></i>
                 </div>
                 <!-- right -->
                  <div>
                    <h2 class="font-semibold text-xl">4+</h2>
                    <p  class=" text-gray-600 font-medium">No. of Patients</p>
                  </div>
             </div>

               <!-- car1 -->
             <div class=" bg-white p-4 flex justify-around rounded-md shadow-md border border-gray-50 hover:-translate-y-1 hover:shadow-lg transition-all">
                <!-- left -->
                 <div class="bg-slate-600 h-10 w-10 rounded-full flex items-center justify-center">
                      <i class="fa-solid fa-users text-xl text-sky-300"></i>
                 </div>
                 <!-- right -->
                  <div>
                    <h2 class="font-semibold text-xl">4+</h2>
                    <p  class=" text-gray-600 font-medium">No.of Staffs</p>
                  </div>
             </div>
        </section>

        <!-- recent table -->
         <section class="py-10">
            <p class="font-semibold text-xl">Recent Appointment+</p>
            <table class="w-full mt-2 rounded-lg overflow-hidden">
                <thead class="bg-slate-600 border-collapse">
                    <tr class="">
                        <th class="p-4 border-r border-white">ID</th>
                        <th class="p-4 border-r border-white">NAME</th>
                        <th class="p-4 border-r border-white">ADDRESS</th>
                        <th class="p-4 border-r border-white">AGE</th>
                        <th class="p-4 border-r border-white">DEPARTMENT</th>
                         <th class="p-4 border-r border-white">Action</th>
                    </tr>
                </thead>
                <tbody class="border-collapse bg-white ">
                    <tr class="border-b">
                        <td  class="p-4 text-center">FKH001</td>
                        <td  class="p-4 text-center">Farid</td>
                        <td  class="p-4 text-center">Lilong</td>
                        <td  class="p-4 text-center">23</td>
                        <td  class="p-4 text-center">Orthologist</td>
                        <td class="flex items-center justify-center py-3">
                            <form action="" >
                            <input type="hidden">
                            <button class="bg-red-500 px-4 py-1.5 rounded-lg text-white font-semibold cursor-pointer flex items-center justify-end gap-2 ">
                                <i class="fa-solid fa-trash"></i>
                                Delete
                            </button>
                        </form>
                        </td>
                    </tr>
                </tbody>
               
            </table>

        <div class="flex items-center justify-end gap-6 mt-4 pr-4">
         <a href=""
        class="bg-blue-500 text-white font-semibold px-4 py-1 rounded-md"
         >Previous</a>
         <a href=""
           class="bg-green-500 text-white font-semibold px-4 py-1 rounded-md"
         >Next</a>
        </div>  
         </section>
     </main>
</body>
</html>
